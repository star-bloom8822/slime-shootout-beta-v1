<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slime Shootout Beta Version 1.0</title>
  <link rel="preload" href="https://raw.githubusercontent.com/star-bloom8822/slime-shootout-beta-v1/refs/heads/main/slimegoalkeeper.png" as="image">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: monospace; background: #000; }
        
        #gameViewport { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; transition: filter 2s ease-in-out;}
        
        /* Smooth color transitions to prevent eye strain */
        #sky { background: #5499C7; height: 50%; position: relative; transition: background 0.8s ease; }
        #grass { background: #6AB187; height: 50%; position: relative; border-top: 6px solid #E0E0E0; transition: background 0.8s ease; }
        
        .sudden-death-sky { background: #5F9EA0 !important; transition: background 1s ease;}
        .sudden-death-grass { background: #2F4F4F !important; border-top: 6px solid #fff !important; transition:background 1s ease;}
        
        .sunset-sky { 
    background: #A69BC4 !important; 
    transition: background 1.5s ease-in-out !important; 
}
        .sunset-grass { 
    background: #5F8D4E !important; 
    border-top: 6px solid #FFFFFF !important; 
    transition: background 1.5s ease-in-out !important; 
}
      
        #goalPostContainer {
            position: absolute;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 780px;
            height: 240px;
            border: 12px solid #e0e0e0;
            box-shadow: 0 0 20px rgba(42, 127, 127, 0.4), 
                inset 0 0 10px rgba(42, 127, 127, 0.2);
    
            border-bottom: none;
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 1; 
        }

        #topUiHeaderRow {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .top-ui-rect {
            height: 54px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
            padding: 0 14px;
            white-space: nowrap;
            min-width: 140px;
        }

      #streakCount {
    color: #FFFFFF !important;
    margin-left: 8px;
    font-weight: 800;
}
        #announcementLabel { position: absolute; width: 100%; text-align: center; top: 15%; color: #E0F7FA; font-size: 28px; font-weight: bold; text-shadow: 3px 3px #000; display: none; z-index: 10; padding: 0 10px; }
        
        #replayContainer { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 90%; 
            max-width: 340px; 
            display: none; 
            z-index: 30; 
            text-align: center; 
        }
        
      #leaderboardDisplay { 
            background: rgba(0, 0, 0, 0.95); 
            border: 3px solid #e0e0e0; 
            border-radius: 12px; 
            padding: 20px; 
            color: #F8F9FA; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            margin-bottom: 15px; 
        }
        
        .score-row { display: flex; justify-content: space-between; margin: 10px 0; padding: 10px 14px; background: rgba(255,255,255,0.08); border-radius: 6px; font-size: 15px; border-left: 3px solid #ccc; }
        .gold-rank { background: rgba(255, 255, 255, 0.2); border: 2px solid #FFFFFF; border-left: 4px solid #FFFFFF; color: #FFFFFF; font-weight: bold; }
    
        #replayButton { 
            width: 100%; 
            padding: 16px; 
            font-size: 20px; 
            font-weight: bold; 
            color: #fff; 
            background: #77AADD; 
            border: 3px solid #fff; 
            border-radius: 12px; 
            cursor: pointer; 
            box-shadow: 0 6px 0 #b56b00, 0 10px 20px rgba(0,0,0,0.5); 
            text-shadow: 1px 1px #000; 
        }


      .slimeTrail {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: scale(1);
            width: 30px; 
            height: 30px;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
            background-color: #9966CC !important;
            border: 2px solid rgba(255, 255, 255, 0.5);
            opacity: 0.7;
        }


        #slimeShadow {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
        }
        
        #slimeGoalie { 
            position: absolute; 
            bottom: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 110px; 
            height: 140px; 
            will-change: left, transform, width, height; 
            z-index: 2; 
        }

        #singleSlimeSprite {
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/star-bloom8822/slime-shootout-beta-v1/refs/heads/main/slimegoalkeeper.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            transition: opacity 0.6s ease-in;
            opacity: 1;
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.3));
            transition: filter 0.5s ease, outline 0.5s ease;
        }
        
        #slimeLabel { 
            color: #2C3E50; 
            font-size: 20px; 
            font-weight: bold; 
            white-space: nowrap; 
            text-align: center;
            margin-top: 38px; 
            text-shadow: 1px 1px 0px rgba(255,255,255,0.6);
        }

        #twinsContainer {
            display: none;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        .twin-body {
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            width: 95px;
            height: 140px;
            background-image: url('https://raw.githubusercontent.com/star-bloom8822/slime-shootout-beta-v1/refs/heads/main/slimegoalkeeper.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .twin-label {
            color: #2C3E50; 
            font-size: 17px; 
            font-weight: bold;
            margin-top: 38px; 
            text-shadow: 1px 1px 0px rgba(255,255,255,0.6);
        }

        .invincible-flash {
            animation: comfortable-pulse 1.5s ease-in-out infinite alternate;
            pointer-events: none;
        }
        
        .big-wobble {
    animation: bigWobbleAnim 0.6s ease-in-out infinite;
    z-index: 100 !important;
}

@keyframes bigWobbleAnim {
    0%, 100% { transform: scale(1.5) rotate(0deg); }
    25% { transform: scale(1.55) rotate(-5deg); }
    75% { transform: scale(1.55) rotate(5deg); }
}

.pancake-dive {
    animation: pancakeDiveAnim 0.5s ease-in-out forwards;
    transform-origin: bottom center;
}

@keyframes pancakeDiveAnim {
    0% { transform: translateY(0) scale(1.2); }
    
    /* Jump Up */
    20% { transform: translateY(-40px) scale(1.2); }
    
    /* Fall and Splat */
    40% { transform: translateY(0) scale(1.2); }
    
    /* Squish/Pancake Phase */
    60% { transform: translateY(0) scale(1.6, 0.3); }
    
    /* Bounce slightly while flat */
    80% { transform: translateY(-10px) scale(1.5, 0.4); }
    
    /* Settle on ground */
    100% { transform: translateY(0) scale(1.6, 0.3); bottom: -15px; }
}
        @keyframes comfortable-pulse {
          0% { opacity: 1; }
          100% { opacity: 0.6; } /* Comfortable fade range */
}
        
        @keyframes slowPulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.02); } /* Very subtle growth */
    100% { transform: translateX(-50%) scale(1); }
}

.pulse-mode {
    animation: slowPulse 3s ease-in-out infinite;
}

        .soccer-tap-effect {
            position: absolute;
            width: 65px;
            height: 65px;
            background-image: url('https://raw.githubusercontent.com/star-bloom8822/slime-shootout-beta-v1/refs/heads/main/soccerball.png');
            background-size: 100% 100%;
            pointer-events: none;
            z-index: 5;
            animation: ballIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes ballIn {
            0% { transform: translate(-50%, -50%) scale(0.4) rotate(0deg); opacity: 1; }
            50% { transform: translate(-50%, -100%) scale(1.1) rotate(180deg); opacity: 1; }
            100% { transform: translate(-50%, -160%) scale(0.8) rotate(360deg); opacity: 0; }
        }

        .ui-heart {
            width: 20px;
            height: 20px;
            object-fit: contain;
            margin-left: 2px;
        }
    </style>
</head>
<body>
 
    <div id="gameViewport">
        <div id="sky">
            <div id="topUiHeaderRow">
                <div id="scoreLabel" class="top-ui-rect">
          STREAK: <span id="streakCount" style="font-size: 20px; color:#ffeb3b; font-weight: bold; margin-left: 6px;">0</span></div>
                <div id="livesLabel" class="top-ui-rect">LIVES: <span id="heartContainer" style="display:inline-flex; align-items:center; margin-left:6px; font-size: 22px;"></span></div>
            </div>
            <div id="announcementLabel"></div>
            
            <div id="goalPostContainer"></div>

            <div id="slimeGoalie">
                <div id="singleSlimeSprite">
                    <span id="slimeLabel"></span>
                </div>
                <div id="twinsContainer">
                    <div class="twin-body"><span class="twin-label" id="twinLabelA"></span></div>
                    <div class="twin-body"><span class="twin-label" id="twinLabelB"></span></div>
                </div>
                <div id="slimeShadow"></div>
            </div>
        </div>
        
        <div id="grass">
            <div id="replayContainer">
                <div id="leaderboardDisplay">
                    <h4 id="leaderboardTitle">[- TOTAL BEST RECORDS -]</h4>
                    <div id="leaderboardRows"></div>
                </div>
                <button id="replayButton">PLAY AGAIN</button>
            </div>
        </div>
    </div>
 
    <script>
        let current_streak = 0;
        let lives = 5; 
        let game_over = false;
        let game_started = false; 
        let tealStadiumPlayed = false;
        let is_in_knockout_phase = false;
        let wave_position = 0;
        let animationFrameId = null; 
        
        let speed_multiplier = 0.50; 
        let current_phase = "sleepy"; 
        
        let trail_counter = 0;
        let input_cooldown = false;
        let local_action_state = false;
        let sleepTimerId = null;
        let is_invincible = false;

        let shakeOffsetIntensity = 0;
        let inSlowMotionPhase = false;

        let active_break_type = null; 
        let break_timestamp = 0;
        let checked_streak_for_break = -1;
        
        let second_life_granted = false;
        let elite_phase_type = "none"; 
        let elite_timer_timestamp = 0;

        let oob_active = false;
        let oob_timestamp = 0;

        // Custom Teal Stadium Rapid Counter Variables
        let is_in_teal_stadium = false;
        let shots_remaining_in_teal = 0;

        const RAW_EMOTICONS = ["8)", "0_0", "x_x", "@_@", "T_T", "\\(0-0/", "(^-^)b", "-_-", "\\(^0^)/", "(>_<)X", "(^_^ ; )", "*-*", ":/ ", "(^_^) ", "(. _ . )", "(- _-) zZ", "D : ", "p(_q)", "\\(~o~)/", "//o//", "_ / _", "d(^_^)b", "(_ _ ; )"];

        let shuffledWanderingPool = [];
        let lastUsedEmoticon = "";

        const CELEBRATION_EMOTICONS = ["(^-^)b", "\\(^0^)/", "d(^_^)b", "(^_^) ", "8)"];
        const PANIC_EMOTICONS = ["(>_<)X", "(_ _ ; )", "(^_^ ; )", "@_@", "T_T"];

        let active_cycled_phrase = "";
        let alternative_twin_phrase = "";
        let phrase_swap_timestamp = 0;

        const sky = document.getElementById('sky');
        const grass = document.getElementById('grass');
        const slime = document.getElementById('slimeGoalie');
        const singleSlimeSprite = document.getElementById('singleSlimeSprite');
        const twinsContainer = document.getElementById('twinsContainer');
        const twinLabelA = document.getElementById('twinLabelA');
        const twinLabelB = document.getElementById('twinLabelB');
        const slimeLabel = document.getElementById('slimeLabel');
        const slimeShadow = document.getElementById('slimeShadow');
        const streakCount = document.getElementById('streakCount');
        const livesLabel = document.getElementById('livesLabel');
        const heartContainer = document.getElementById('heartContainer');
        const announcementLabel = document.getElementById('announcementLabel');
        const replayContainer = document.getElementById('replayContainer');
        const replayButton = document.getElementById('replayButton');
        const leaderboardRows = document.getElementById('leaderboardRows');
        const gameViewport = document.getElementById('gameViewport');
        
        function getNextUnrepeatedEmoticon() {
            if (shuffledWanderingPool.length === 0) {
                shuffledWanderingPool = [...RAW_EMOTICONS];
                let rxIndex = shuffledWanderingPool.indexOf("x_x");
                if (rxIndex > -1) shuffledWanderingPool.splice(rxIndex, 1);
                
                for (let i = shuffledWanderingPool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledWanderingPool[i], shuffledWanderingPool[j]] = [shuffledWanderingPool[j], shuffledWanderingPool[i]];
                }
                
                if (shuffledWanderingPool[0] === lastUsedEmoticon && shuffledWanderingPool.length > 1) {
                    let swapItem = shuffledWanderingPool.pop();
                    shuffledWanderingPool.unshift(swapItem);
                }
            }
            lastUsedEmoticon = shuffledWanderingPool.shift();
            return lastUsedEmoticon;
        }

        function getActionEmoticon(pool) {
            let pos = Math.floor(Math.random() * pool.length);
            return pool[pos];
        }

        function setupInitialDefaultFaces() {
            active_cycled_phrase = getNextUnrepeatedEmoticon();
            alternative_twin_phrase = getNextUnrepeatedEmoticon();
            slimeLabel.innerHTML = active_cycled_phrase;
            twinLabelA.innerHTML = active_cycled_phrase;
            twinLabelB.innerHTML = alternative_twin_phrase;
        }
         function setPulseState(isActive) {
            const slimeGoalie = document.getElementById('slimeGoalie');
            if (isActive) {
                slimeGoalie.classList.add('pulse-mode');
            } else {
                slimeGoalie.classList.remove('pulse-mode');
            }
        }
        
        function checkPhaseIntensity() {
            if (current_phase === "sudden-death") {
                setPulseState(true);
            } else {
                setPulseState(false);
            }
        } 
        function beginSleepTimer() {
            current_phase = "sleepy";
            game_started = false;
            speed_multiplier = 0.70; 
            setupInitialDefaultFaces();
            
            sleepTimerId = setTimeout(() => {
                game_started = true;
                showCelebrationText("WAKE UP!");
                phrase_swap_timestamp = Date.now();
            }, 2000); 
        }

        function triggerScreenShake(pixelsIntensity) {
            // Capped intensity down from 26 to 14 to reduce optical motion sickness
            shakeOffsetIntensity = Math.min(pixelsIntensity, 7);
        }

        function updateMovement() {
            if (game_over) {
                if (shakeOffsetIntensity > 0.5) {
                    let currentOffsetX = (Math.random() - 0.5) * shakeOffsetIntensity;
                    let currentOffsetY = (Math.random() - 0.5) * shakeOffsetIntensity;
                    gameViewport.style.transform = `translate(${currentOffsetX}px, ${currentOffsetY}px)`;
                    shakeOffsetIntensity *= 0.88; 
                } else {
                    gameViewport.style.transform = "translate(0px, 0px)";
                }
                animationFrameId = requestAnimationFrame(updateMovement);
                return;
            }
            
            let now = Date.now();

            if (game_started && speed_multiplier < 1.6 && !inSlowMotionPhase && !active_break_type && !oob_active) {
                speed_multiplier += 0.0006;
                if (speed_multiplier > 1.6) speed_multiplier = 1.6;
            }
            
            if (lives === 1 && !inSlowMotionPhase) {
                speed_multiplier = 1.6;
            }

            if (!game_started) {
                current_phase = "sleepy";
            } else if (inSlowMotionPhase) {
                // Keep context intact
            } else if (current_streak >= 100) {
                current_phase = "elite_mastery";
            } else if (speed_multiplier < 1.10) {
                current_phase = "wobble";
            } else if (speed_multiplier >= 1.10 && speed_multiplier < 1.35) {
                current_phase = "keeperNormal"; 
            } else if (speed_multiplier >= 1.35 && speed_multiplier < 1.55) {
                current_phase = "twins";    
            } else {
                current_phase = "keeperNormal"; 
            }

            if (current_phase === "elite_mastery" && !active_break_type && !oob_active) {
                if (now - elite_timer_timestamp > 4000) {
                    let phases = ["trail", "pancake", "big"];
                    elite_phase_type = phases[Math.floor(Math.random() * phases.length)];
                    elite_timer_timestamp = now;
                    
                    if (elite_phase_type === "trail") showCelebrationText("SLIME TRAIL!");
                    if (elite_phase_type === "pancake") showCelebrationText("PANCAKE DIVE!");
                    if (elite_phase_type === "big") showCelebrationText("BIG WOBBLE!");
                }
            }

            if (game_started && !active_break_type && !oob_active && !inSlowMotionPhase && !local_action_state) {
                if (now - phrase_swap_timestamp > 5000) {
                    active_cycled_phrase = getNextUnrepeatedEmoticon();
                    alternative_twin_phrase = getNextUnrepeatedEmoticon();
                    phrase_swap_timestamp = now;
                }
            }

            if (game_started && !active_break_type && !oob_active && current_streak > 20 && Math.random() < 0.002) {
                active_break_type = Math.random() > 0.5 ? "sneeze" : "sleep_fake";
                break_timestamp = now;
                showCelebrationText(active_break_type === "sneeze" ? "HEAR A SNEEZE COMING..." : "SUDDENLY DROWSY...");
            }

            if (game_started && !active_break_type && !oob_active && checked_streak_for_break !== current_streak) {
                if (current_streak === 3) {
                    active_break_type = "tea";
                    break_timestamp = now;
                    checked_streak_for_break = current_streak;
                    showCelebrationText("TEA BREAK!");
                } else if (current_streak === 8) {
                    active_break_type = "munch";
                    break_timestamp = now;
                    checked_streak_for_break = current_streak;
                    showCelebrationText("MUNCH BREAK!");
                } else if (current_streak === 14) {
                    active_break_type = "skincare";
                    break_timestamp = now;
                    checked_streak_for_break = current_streak;
                    showCelebrationText("SKINCARE BREAK!");
                }
            }

            if (current_streak >= 100 && !second_life_granted) {
                second_life_granted = true;
                lives += 1;
                refreshLivesUI();
                showCelebrationText("BONUS SECOND LIFE GRANTED!");
                triggerScreenShake(15);
            }

            if (active_break_type && (now - break_timestamp > 1800)) {
                active_break_type = null; 
                phrase_swap_timestamp = now;
            }

            if (current_phase === "twins" && !oob_active && !active_break_type && Math.random() < 0.003 && now - oob_timestamp > 9000) {
                oob_active = true;
                oob_timestamp = now;
            }
            if (oob_active && (now - oob_timestamp > 1300)) {
                oob_active = false; 
                phrase_swap_timestamp = now;
            }

            let moveStep = 0.052 * speed_multiplier;
            if (inSlowMotionPhase) moveStep = 0.003 * speed_multiplier;
            if (current_phase === "elite_mastery" && elite_phase_type === "big") moveStep = 0.015 * speed_multiplier;
            if (active_break_type || oob_active) moveStep = 0; 

            wave_position += moveStep;
            
            const centerPoint = window.innerWidth / 2;
            const boundaries = window.innerWidth * 0.36; 
            
            let coreX = centerPoint + Math.sin(wave_position) * boundaries;

            if (active_break_type) {
                coreX = centerPoint; 
            } else if (oob_active) {
                coreX = -200; 
            }

            trail_counter++;
            if (trail_counter % 20 === 0 && game_started && !oob_active && (lives === 1 || (current_phase === "elite_mastery" && elite_phase_type === "trail"))) { 
                generateSlimeTrailParticle(coreX);
            }

            if (current_phase === "twins" && !active_break_type) {
                singleSlimeSprite.style.display = "none";
                twinsContainer.style.display = "flex";
                
                slime.style.width = "250px"; 
                slime.style.height = "140px";
                slime.style.left = `${coreX}px`;
                slimeShadow.style.width = "240px";
                
                if (!local_action_state) {
                    twinLabelA.innerHTML = active_cycled_phrase;
                    twinLabelB.innerHTML = alternative_twin_phrase;
                }
            } else {
                singleSlimeSprite.style.display = "flex";
                twinsContainer.style.display = "none";

                let targetWidth = 110;
                let targetHeight = 140;
                let targetRotation = 0;
                slimeLabel.style.marginTop = "38px";

                if (current_phase === "elite_mastery" && !active_break_type) {
                    if (elite_phase_type === "pancake") {
                        targetWidth = 190;
                        targetHeight = 55;
                        slimeLabel.style.marginTop = "6px";
                    } else if (elite_phase_type === "big") {
                        targetWidth = 220;
                        targetHeight = 220;
                        slimeLabel.style.marginTop = "75px";
                    }
                }

                slime.style.width = `${targetWidth}px`;
                slime.style.height = `${targetHeight}px`;
                slimeShadow.style.width = `${targetWidth}px`;
                slime.style.left = `${coreX}px`;

                // Prioritizing user-directed clean emoticon configurations
                if (active_break_type === "tea" || is_in_teal_stadium) {
                    slimeLabel.innerHTML = "( ^-^)_旦~~"; // Shows tea drinking clearly during breaks & throughout rapid stadium rounds
                } else if (active_break_type === "munch") {
                    slimeLabel.innerHTML = "( -_ - ) [,,]"; 
                } else if (active_break_type === "skincare") {
                    slimeLabel.innerHTML = "[- _ -]"; 
                } else if (active_break_type === "sneeze") {
                    slimeLabel.innerHTML = " >_ < ... ACHOO!";
                } else if (active_break_type === "sleep_fake") {
                    slimeLabel.innerHTML = "(-_ -) zZ Z";
                } else if (oob_active) {
                    slimeLabel.innerHTML = ":/ ";
                } else {
                    if (current_phase === "sleepy" || current_phase === "wobble" || (current_phase === "elite_mastery" && elite_phase_type === "big")) {
                        targetRotation = Math.sin(wave_position * 2.5) * (elite_phase_type === "big" ? 12 : 6); 
                    }
                    if (!local_action_state) slimeLabel.innerHTML = active_cycled_phrase;
                }

                slime.style.transform = `translateX(-50%) rotate(${targetRotation}deg)`;
            }

            if (shakeOffsetIntensity > 0.5) {
                let currentOffsetX = (Math.random() - 0.5) * shakeOffsetIntensity;
                let currentOffsetY = (Math.random() - 0.5) * shakeOffsetIntensity;
                gameViewport.style.transform = `translate(${currentOffsetX}px, ${currentOffsetY}px)`;
                shakeOffsetIntensity *= 0.88; 
            } else {
                gameViewport.style.transform = "translate(0px, 0px)";
            }
            
            animationFrameId = requestAnimationFrame(updateMovement);
        }

        function generateSlimeTrailParticle(horizontalOffset) {
            const blob = document.createElement('div');
            blob.className = 'slimeTrail';
            blob.style.background = "rgba(0, 255, 255, 0.5)";
            blob.style.left = `${horizontalOffset - 4 + (Math.random() * 8)}px`;
            blob.style.top = `${window.innerHeight * 0.40 + (Math.random() * 20)}px`;
            blob.style.width = "14px";
            blob.style.height = "7px";
            gameViewport.appendChild(blob);
            
            setTimeout(() => {
                blob.style.transform = "scale(0.1)";
                blob.style.opacity = "0";
            }, 250);
            setTimeout(() => blob.remove(), 450);
        }

        function triggerBallTapGraphic(x, y) {
            const ball = document.createElement('div');
            ball.className = 'soccer-tap-effect';
            ball.style.left = `${x}px`;
            ball.style.top = `${y}px`;
            document.body.appendChild(ball);
            setTimeout(() => { ball.remove(); }, 400);
        }

        function handleInput(e) {
    if (game_over || inSlowMotionPhase) return;
    if (e.target.id === 'replayButton') return;
    if (input_cooldown) return;
    
    input_cooldown = true;
    setTimeout(() => { input_cooldown = false; }, 160); 
    
    const currentTapX = e.touches ? e.touches[0].clientX : e.clientX;
    const currentTapY = e.touches ? e.touches[0].clientY : e.clientY;

    triggerBallTapGraphic(currentTapX, currentTapY);

    if (active_break_type !== null && !is_in_teal_stadium) {
        deductUserLife();
        return;
    }

    let directHit = false;
    let withinGoalBounds = false;
    
    let perfectWindow = is_in_teal_stadium ? 220 : (current_phase === "twins" ? 150 : 90);      
    let safeSaveWindow = is_in_teal_stadium ? window.innerWidth * 0.60 : (current_phase === "twins" ? window.innerWidth * 0.50 : window.innerWidth * 0.40); 

    const primaryRect = slime.getBoundingClientRect();
    if (currentTapX >= (primaryRect.left - perfectWindow) && currentTapX <= (primaryRect.right + perfectWindow)) {
        directHit = true;
    }
    if (currentTapX >= (primaryRect.left - safeSaveWindow) && currentTapX <= (primaryRect.right + safeSaveWindow)) {
        withinGoalBounds = true;
    }
    
    if (directHit || withinGoalBounds) {
        current_streak += 1; 

        if (is_in_teal_stadium) {
            if (shots_remaining_in_teal > 0) {
            shots_remaining_in_teal -= 1;
        }
          
            if (shots_remaining_in_teal <= 0 && !is_in_knockout_phase) {
                is_in_knockout_phase = true;
                showCelebrationText("STADIUM CLEARED!");
                
                if (lives < 2) {
                    lives = 2; 
                    refreshLivesUI();
                }
                
                // --- KNOCKOUT PHASE ---
                showCelebrationText("KNOCKOUT STAGE: THE GOOFY STAND-OFF!");
                
                sky.classList.add('sunset-sky');
                grass.classList.add('sunset-grass');
                slime.classList.add('big-wobble'); 
                
                spawnBlockingSlimes(); 

                setTimeout(() => {
                    slime.classList.remove('big-wobble');
                    slime.classList.add('pancake-dive');
                    showCelebrationText("PANCAKE DIVE!");
                    
                    setTimeout(() => {
                        slime.classList.remove('pancake-dive');
                        is_in_knockout_phase = false;
                        is_in_teal_stadium = false;
                        speed_multiplier = 0.90;
                        
                        sky.classList.remove('sunset-sky', 'sudden-death-sky');
                    grass.classList.remove('sunset-grass', 'sudden-death-grass');
                    gameViewport.classList.remove('dim-mode');
                }, 1500);
            }, 2000);

        } else if (shots_remaining_in_teal > 0) {
            showCelebrationText(`SHOTS LEFT: ${shots_remaining_in_teal}`);
        }
    } else {
        // Normal game behavior
        local_action_state = true;
        if (current_phase === "twins") {
            twinLabelA.innerHTML = getActionEmoticon(CELEBRATION_EMOTICONS);
            twinLabelB.innerHTML = getActionEmoticon(CELEBRATION_EMOTICONS);
        } else {
            slimeLabel.innerHTML = getActionEmoticon(CELEBRATION_EMOTICONS);
        }
        setTimeout(() => { if(!game_over) { local_action_state = false; } }, 350);
    }
} else {
    // Miss logic
    let missedDistance = Math.abs(currentTapX - (primaryRect.left + primaryRect.width / 2));
    if (missedDistance <= 200 && lives > 1) {
        local_action_state = true;
        if (!is_in_teal_stadium) {
            if (current_phase === "twins") {
                twinLabelA.innerHTML = "@_@";
                twinLabelB.innerHTML = "(>_<)X";
            } else {
                slimeLabel.innerHTML = Math.random() > 0.5 ? "(>_<)X" : "@_@";
            }
        }
        setTimeout(() => { deductUserLife(); }, 350);
    } else {
        deductUserLife();
    }
}
refreshScoreDisplays();
        }

        function spawnBlockingSlimes() {
    console.log("Blocking slimes skipped.");
}
      
        function deductUserLife() {
            if (is_invincible || game_over) return;

            active_break_type = null;
            oob_active = false;

            let nextLifeValue = Math.max(0, lives - 1);
            
            if (nextLifeValue === 1 && !tealStadiumPlayed) {
                tealStadiumPlayed = true;
                inSlowMotionPhase = true;
                local_action_state = true;
                
                slimeLabel.innerHTML = "T_T";
                twinLabelA.innerHTML = "T_T";
                twinLabelB.innerHTML = "T_T";
                
                showCelebrationText("WARNING...");
                triggerScreenShake(8);

                setTimeout(() => {
                    lives = 1;
                    refreshLivesUI();
                    inSlowMotionPhase = false;
                    local_action_state = false;

                    is_in_teal_stadium = true;
                    // Randomize shots left dynamically between 10 and 12
                    shots_remaining_in_teal = 12;

                    sky.classList.add('sudden-death-sky');
                    grass.classList.add('sudden-death-grass');
                    showCelebrationText(`TEAL SURVIVAL STADIUM: TAP RAPIDLY!`);
                    
                   
                    speed_multiplier = 1.35;
                    phrase_swap_timestamp = Date.now();
                }, 1600);

            } else {
                lives = nextLifeValue;
                refreshLivesUI();
 
                if (lives <= 0) {
                    triggerEndGameSequence();
                } else {
                      triggerScreenShake(8);
                showCelebrationText("MISSED!");
                  
                    is_invincible = true;
                    livesLabel.classList.add('invincible-flash');
                    setTimeout(() => {
                is_invincible = false;
                livesLabel.classList.remove('invincible-flash');
            }, 2000);
        }
    }
    refreshScoreDisplays();
}

        function refreshLivesUI() {
            heartContainer.innerHTML = "";
            for (let i = 0; i < lives; i++) {
                heartContainer.innerHTML += `<img src="https://raw.githubusercontent.com/star-bloom8822/slime-shootout-beta-v1/refs/heads/main/heartlives.png" class="ui-heart" />`;
            }
            let lostCount = 5 - lives;
            for (let j = 0; j < lostCount; j++) {
                heartContainer.innerHTML += `<img src="https://raw.githubusercontent.com/star-bloom8822/slime-shootout-beta-v1/refs/heads/main/liveslost.png" class="ui-heart" />`;
            }
        }

        function showCelebrationText(msg) {
            announcementLabel.innerText = msg;
            announcementLabel.style.display = "block";
            setTimeout(() => {
                if (announcementLabel.innerText === msg) announcementLabel.style.display = "none";
            }, 750);
        }

        window.addEventListener('touchstart', (e) => { 
            if(e.target.id === 'replayButton') return;
            e.preventDefault(); 
            handleInput(e); 
        }, { passive: false });
        window.addEventListener('mousedown', handleInput);
        replayButton.addEventListener('click', (e) => { e.stopPropagation(); restartGameMatch(); });
 
        function processLeaderboardMetrics(finalValue) {
            let recordsList = JSON.parse(localStorage.getItem('slime_streaks')) || [0, 0, 0];
            recordsList.push(finalValue);
            recordsList.sort((a, b) => b - a);
            recordsList = recordsList.slice(0, 3); 
            localStorage.setItem('slime_streaks', JSON.stringify(recordsList));
            
            leaderboardRows.innerHTML = '';
            recordsList.forEach((score, index) => {
                const rankTag = `[#${index + 1}]`;
                const visualRowClass = index === 0 ? "score-row gold-rank" : "score-row";
                leaderboardRows.innerHTML += `<div class="${visualRowClass}"><span>${rankTag} RECORD</span><strong>${score} PTS</strong></div>`;
            });
        }

        function refreshScoreDisplays() {
            streakCount.innerText = current_streak;
        }

        function triggerEndGameSequence() {
            game_over = true;
            is_in_teal_stadium = false;
            clearTimeout(sleepTimerId);
            
            triggerScreenShake(4);

            setTimeout(() => {
                announcementLabel.innerText = "* PSYCH !!! *";
                announcementLabel.style.display = "block";
                triggerScreenShake(4);
            
                setTimeout(() => {
                    announcementLabel.innerText = "GOAL!!!";
                    
                    setTimeout(() => {
                        announcementLabel.innerText = "Good game. Match ended.";
              
                    setTimeout(() => {
                    announcementLabel.style.display = "none";
              
                    singleSlimeSprite.style.display = "flex";
                    twinsContainer.style.display = "none";
                    
                    slime.style.width = "110px";
                    slime.style.height = "140px";
                    slimeShadow.style.width = "110px";
                    
                    const meltFrames = ["x_x", "T_T", "(. _ . )", "...", "___"];
                    let frameIndex = 0;
                    
                    let meltInterval = setInterval(() => {
                        if (frameIndex < meltFrames.length) {
                            slimeLabel.innerHTML = meltFrames[frameIndex];
                            triggerScreenShake(4);
                            frameIndex++;
                        } else {
                            clearInterval(meltInterval);
                            slime.style.display = "none";
                            processLeaderboardMetrics(current_streak);
                            replayContainer.style.display = "block";
                        }
                    }, 250);
                }, 1100); // Wait 1.1s before melting
            }, 1100); // Wait 1.1s before showing "Good game"
        }, 1100); // Wait 1.1s before showing "GOAL!!!"
    }, 600); // Initial delay
} 
      
        function restartGameMatch() {
            current_streak = 0;
            lives = 5;
            game_over = false;
            wave_position = 0;
            speed_multiplier = 0.70;
            input_cooldown = false;
            local_action_state = false;
            is_invincible = false;
            inSlowMotionPhase = false;
            shakeOffsetIntensity = 0;
            active_break_type = null;
            checked_streak_for_break = -1;
            second_life_granted = false;
            elite_phase_type = "none";
            oob_active = false;
            is_in_teal_stadium = false;
            shots_remaining_in_teal = 0;
            shuffledWanderingPool = [];
            lastUsedEmoticon = "";

            sky.classList.remove('sudden-death-sky');
            grass.classList.remove('sudden-death-grass');
            replayContainer.style.display = "none";
            slime.style.display = "block";

            refreshLivesUI();
            refreshScoreDisplays();
            livesLabel.classList.remove('invincible-flash');
            
            beginSleepTimer();
        }

        refreshLivesUI();
        beginSleepTimer();
        updateMovement();
    </script>
</body>
</html>
